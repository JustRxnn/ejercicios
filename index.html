<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"/><title>Ej16 - Pipeline completo</title></head>
<body>
<a href="../index.html">← Volver</a>
<h2>Ejercicio 16: Pipeline completo</h2>
<p>Encadena <b>filter → map → sort → forEach</b> sobre el array de pedidos.</p>
<button id="btn">Ejecutar</button>
<pre id="out"></pre>
<script>
document.getElementById("btn").addEventListener("click", function() {
  const pedidos = [
    { id: "P01", importe: 45.0,  entregado: true  },
    { id: "P02", importe: 120.0, entregado: false  },
    { id: "P03", importe: 33.5,  entregado: true  },
    { id: "P04", importe: 89.0,  entregado: true  },
    { id: "P05", importe: 15.0,  entregado: false  },
  ];

  let texto = "TODOS LOS PEDIDOS:\n";
  pedidos.forEach(p => {
    texto += "  " + p.id + " — " + p.importe + " € — " + (p.entregado ? "entregado ✅" : "pendiente ❌") + "\n";
  });

  texto += "\nPIPELINE: filter → map → sort → forEach\n\n";

  let resultado = "";
  pedidos
    .filter(p => p.entregado)
    .map(p => ({ ...p, importeConIVA: Number((p.importe * 1.21).toFixed(2)) }))
    .sort((a, b) => b.importeConIVA - a.importeConIVA)
    .forEach(p => {
      resultado += "  " + p.id + " → " + p.importeConIVA + " €\n";
    });

  texto += "RESULTADO (solo entregados, con IVA, mayor→menor):\n" + resultado;

  document.getElementById("out").textContent = texto;
});
</script>
</body>
</html>
